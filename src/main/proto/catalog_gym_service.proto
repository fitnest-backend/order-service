// Copied from catalog-service for cross-service gRPC
syntax = "proto3";

package catalog;
option java_multiple_files = true;
option java_package = "az.fitnest.catalog.grpc";

message GymSupportsPlanRequest {
  int64 gym_id = 1;
  int64 plan_id = 2;
}

message GymSupportsPlanResponse {
  bool supported = 1;
}
