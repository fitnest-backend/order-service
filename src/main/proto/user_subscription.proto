syntax = "proto3";

package az.fitnest.order;

option java_multiple_files = true;
option java_package = "az.fitnest.order.grpc";
option java_outer_classname = "UserSubscriptionProto";

service UserSubscriptionService {
  rpc GetActiveSubscription(GetActiveSubscriptionRequest) returns (ActiveSubscriptionResponse);
  rpc GetUserIdsByPackageId(GetUserIdsByPackageIdRequest) returns (GetUserIdsByPackageIdResponse);
  rpc GetUserIdsByDurationMonths(GetUserIdsByDurationMonthsRequest) returns (GetUserIdsByPackageIdResponse);
  rpc GetUserIdsByType(GetUserIdsByTypeRequest) returns (GetUserIdsByPackageIdResponse);
}

message GetActiveSubscriptionRequest {
  int64 user_id = 1;
}

message ActiveSubscriptionResponse {
  string package_name = 1;
  string subscription_status = 2;  // ACTIVE, FROZEN, or empty for no subscription
  int64 package_id = 3;
  int32 total_limit = 4;
  int32 remaining_limit = 5;
  string expires_at = 6;
}

message GetUserIdsByPackageIdRequest {
  int64 package_id = 1;
}

message GetUserIdsByPackageIdResponse {
  repeated int64 user_ids = 1;
}

message GetUserIdsByDurationMonthsRequest {
  int32 duration_months = 1;
}

message GetUserIdsByTypeRequest {
  string type = 1; // all, active, expired, upgraded, last_7_days
}
