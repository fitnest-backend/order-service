# Validation Errors
error.validation = Произошла ошибка проверки данных
error.invalid_field = Предоставленные данные недействительны
error.missing_field = Обязательное поле отсутствует
error.out_of_range = Предоставленные данные выходят за пределы допустимого диапазона
error.invalid_format = Неверный формат данных

# Authentication Errors
error.unauthorized = Пожалуйста, войдите, чтобы продолжить
error.invalid_credentials = Неверное имя пользователя или пароль
error.token_expired = Срок действия сеанса истек. Пожалуйста, войдите снова
error.account_locked = Ваш аккаунт временно заблокирован
error.account_disabled = Ваш аккаунт отключен

# Authorization Errors
error.forbidden = У вас нет прав для выполнения этого действия
error.access_denied = Доступ запрещен

# Request Format Errors
error.invalid_request = Неверный запрос
error.invalid_json_format = Неверный формат запроса
error.unsupported_media_type = Неподдерживаемый тип медиа
error.method_not_allowed = Метод не поддерживается

# Server Errors
error.internal_server_error = Приносим извинения за техническую проблему. Пожалуйста, попробуйте позже
error.service_unavailable = Служба временно недоступна
error.unexpected = Произошла непредвиденная ошибка

# Resource Errors
error.resource_not_found = Информация не найдена
error.resource_already_exists = Эта информация уже существует
error.resource_conflict = Произошел конфликт данных

# Rate Limiting Errors
error.too_many_requests = Отправлено слишком много запросов. Пожалуйста, подождите
error.rate_limit_exceeded = Превышен дневной лимит

# Order Specific Errors
error.no_active_subscription = У пользователя нет активной подписки
error.plan_not_found = Текущий план не найден
error.duration_config_not_found = Конфигурация продолжительности плана не найдена
error.upgrade_unauthorized = Несанкционированный доступ к подписке
error.target_plan_not_found = Целевой план не найден
error.target_plan_inactive = Целевой план не активен
error.invalid_upgrade_request = Неверная конфигурация запроса на обновление
error.upgrade_not_eligible = Обновление недоступно (разница в цене <= 0)
error.order_not_found = Заказ не найден
