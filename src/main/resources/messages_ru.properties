# Validation Errors
error.validation = Произошла ошибка валидации данных
error.invalid_field = Введенные данные неверны
error.missing_field = Не все обязательные данные заполнены
error.out_of_range = Введенные данные выходят за допустимый диапазон
error.invalid_format = Неверный формат данных

# Authentication Errors
error.unauthorized = Пожалуйста, войдите в систему, чтобы продолжить
error.invalid_credentials = Неверное имя пользователя или пароль
error.token_expired = Время сессии истекло. Пожалуйста, войдите снова
error.account_locked = Ваша учетная запись временно заблокирована
error.account_disabled = Ваша учетная запись деактивирована

# Authorization Errors
error.forbidden = У вас нет прав для выполнения этого действия
error.access_denied = Доступ запрещен

# Request Format Errors
error.invalid_request = Неверный запрос
error.invalid_json_format = Неверный формат запроса
error.unsupported_media_type = Неподдерживаемый тип медиа
error.method_not_allowed = Этот метод не поддерживается

# Server Errors
error.internal_server_error = Приносим извинения за техническую ошибку. Пожалуйста, попробуйте позже
error.service_unavailable = Сервис временно недоступен
error.unexpected = Произошла непредвиденная ошибка

# Resource Errors
error.resource_not_found = Данные не найдены
error.resource_already_exists = Данные уже существуют
error.resource_conflict = Возник конфликт данных

# Rate Limiting Errors
error.too_many_requests = Слишком много запросов. Пожалуйста, подождите
error.rate_limit_exceeded = Дневной лимит исчерпан
