# Validation Errors
error.validation = A validation error occurred
error.invalid_field = The provided field is invalid
error.missing_field = A required field is missing
error.out_of_range = The provided value is out of range
error.invalid_format = Invalid data format

# Authentication Errors
error.unauthorized = Please login to continue
error.invalid_credentials = Invalid username or password
error.token_expired = Session expired. Please login again
error.account_locked = Your account has been temporarily locked
error.account_disabled = Your account is disabled

# Authorization Errors
error.forbidden = You do not have permission to perform this action
error.access_denied = Access denied

# Request Format Errors
error.invalid_request = Invalid request
error.invalid_json_format = The request format is incorrect
error.unsupported_media_type = Unsupported media type
error.method_not_allowed = This method is not allowed

# Server Errors
error.internal_server_error = Something went wrong on our end. Please try again later
error.service_unavailable = Service is temporarily unavailable
error.unexpected = An unexpected error occurred

# Resource Errors
error.resource_not_found = Information not found
error.resource_already_exists = This information already exists
error.resource_conflict = A data conflict occurred

# Rate Limiting Errors
error.too_many_requests = Too many requests. Please wait a moment
error.rate_limit_exceeded = Daily limit exceeded
