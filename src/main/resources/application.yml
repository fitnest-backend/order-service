server:
  port: 8080
  address: 0.0.0.0
  forward-headers-strategy: framework
  http2:
    enabled: true
  tomcat:
    threads:
      max: 200
      min-spare: 20
    connection-timeout: 20000
    max-connections: 10000
    accept-count: 200
    uri-encoding: UTF-8
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,text/plain,text/css,application/javascript,application/openapi+json,application/vnd.api+json,text/html,application/xml,application/vnd.oai.openapi+json

spring:
  threads:
    virtual:
      enabled: true
  main:
    lazy-initialization: ${SPRING_MAIN_LAZY_INITIALIZATION:false}
  messages:
    encoding: UTF-8
  application:
    name: order-backend   # ✅ Changed from order-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgresql-order:5432/fitnest_order}
    username: ${SPRING_DATASOURCE_USERNAME:fitnest_order}
    password: ${SPRING_DATASOURCE_PASSWORD:order_password_123}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keep-alive-time: 300000
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      maximum-pool-size: ${HIKARI_MAX_POOL:15}
      pool-name: HikariCP-Order
      auto-commit: true
      connection-test-query: SELECT 1
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false
  jackson:
    default-property-inclusion: NON_NULL
    time-zone: UTC

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis.fitnest-dev.svc.cluster.local}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 2000ms
        shutdown-timeout: 100ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka-service.fitnest-dev.svc.cluster.local:9092}
    consumer:
      group-id: order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: ${FEIGN_CONNECT_TIMEOUT:5000}
            read-timeout: ${FEIGN_READ_TIMEOUT:10000}
            logger-level: BASIC
      httpclient:
        hc5:
          enabled: true
          pool:
            max-connections: ${FEIGN_MAX_CONNECTIONS:50}
            max-connections-per-route: ${FEIGN_CONNECTIONS_PER_ROUTE:20}
            conn-pool-policy: LIFO

eureka:
  client:
    enabled: false

jwt:
  secret: ${JWT_SECRET:your-jwt-secret-change-in-production}
  issuer: ${JWT_ISSUER:fitnest}

# ✅ Updated service URLs
identity:
  service:
    url: ${IDENTITY_SERVICE_URL:http://identity-backend:8080}

catalog:
  service:
    url: ${CATALOG_SERVICE_URL:http://catalog-backend:8080}

payment:
  service:
    url: ${PAYMENT_SERVICE_URL:http://payment-backend:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
    cache:
      enabled: true
    pre-loading-enabled: true
  paths-to-exclude: /api/v1/internal/**
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    doc-expansion: none
    filter: true
    display-request-duration: true
    try-it-out-enabled: true
    operations-sorter: alpha
    tags-sorter: alpha
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  writer-with-default-pretty-printer: false

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:DEBUG}
    az.fitnest.order: ${LOGGING_LEVEL_AZ_FITNEST_ORDER:DEBUG}
    feign.Logger: OFF
  pattern:
    console: "${LOGGING_PATTERN_CONSOLE:%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n}"
    file: "${LOGGING_PATTERN_FILE:%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n}"
  file:
    name: logs/order-backend.log   # ✅ Updated log file name

grpc:
  server:
    port: 9090
  client:
    # ✅ Updated gRPC client from payment-service to payment-backend
    payment-backend:
      address: 'dns:///payment-backend.fitnest-dev.svc.cluster.local:9091'
      negotiation-type: plaintext