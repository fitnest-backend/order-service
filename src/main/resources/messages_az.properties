# Validation Errors
error.validation = Məlumatların doğrulanması zamanı xəta baş verdi
error.invalid_field = Daxil edilən məlumat yanlışdır
error.missing_field = Zəruri məlumat daxil edilməyib
error.out_of_range = Daxil edilən məlumat tələb olunan diapazondan kənardır
error.invalid_format = Yanlış məlumat formatı

# Authentication Errors
error.unauthorized = Davam etmək üçün daxil olun
error.invalid_credentials = İstifadəçi adı və ya şifrə yanlışdır
error.token_expired = Oturum müddəti başa çatdı. Zəhmət olmasa yenidən daxil olun
error.account_locked = Hesabınız müvəqqəti olaraq bloklanıb
error.account_disabled = Hesabınız qeyri-aktivdir

# Authorization Errors
error.forbidden = Bu əməliyyatı yerinə yetirmək üçün icazəniz yoxdur
error.access_denied = Giriş qadağandır

# Request Format Errors
error.invalid_request = Yanlış sorğu
error.invalid_json_format = Sorğu formatı düzgün deyil
error.unsupported_media_type = Dəstəklənməyən media növü
error.method_not_allowed = Bu metod dəstəklənmir

# Server Errors
error.internal_server_error = Baş vermiş texniki xəta ilə bağlı üzr istəyirik. Qısa müddət sonra yenidən cəhd edin
error.service_unavailable = Xidmət müvəqqəti olaraq əlçatan deyil
error.unexpected = Gözlənilməz xəta baş verdi

# Resource Errors
error.resource_not_found = Məlumat tapılmadı
error.resource_already_exists = Bu məlumat artıq mövcuddur
error.resource_conflict = Məlumat uyğunsuzluğu baş verdi

# Rate Limiting Errors
error.too_many_requests = Çox sayda sorğu göndərilib. Zəhmət olmasa bir qədər gözləyin
error.rate_limit_exceeded = Gündəlik limit keçilib

# Order Specific Errors
error.no_active_subscription = İstifadəçinin aktiv abunəliyi yoxdur
error.plan_not_found = Mövcud plan tapılmadı
error.duration_config_not_found = Planın müddət konfiqurasiyası tapılmadı
error.upgrade_unauthorized = Abunəliyə icazəsiz giriş
error.target_plan_not_found = Hədəf plan tapılmadı
error.target_plan_inactive = Hədəf plan aktiv deyil
error.invalid_upgrade_request = Yanlış təkmilləşdirmə sorğusu konfiqurasiyası
error.upgrade_not_eligible = Təkmilləşdirmə mümkün deyil (qiymət fərqi <= 0)
error.order_not_found = Sifariş tapılmadı
